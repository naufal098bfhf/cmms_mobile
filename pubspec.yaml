name: cmms_mobile

description: "CMMS Mobile Application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP REQUEST
  http: ^1.2.1

  # SHARED PREFERENCES
  shared_preferences: ^2.2.2

  # IMAGE PICKER
  image_picker: ^1.1.2

  # DATE FORMAT
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21